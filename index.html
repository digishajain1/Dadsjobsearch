<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dad's Executive Job Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <h1>Mumbai + Remote Executive Opportunity Dashboard</h1>
      <p>
        Focused on telecom, data center, connectivity, and board-level opportunities.
      </p>
      <div class="controls">
        <input id="search" type="search" placeholder="Search title, company, location, sector..." />
        <select id="locationFilter">
          <option value="all">All locations</option>
          <option value="mumbai">Mumbai</option>
          <option value="remote">Remote</option>
        </select>
        <select id="statusFilter">
          <option value="all">All tracker statuses</option>
          <option value="shortlist">Shortlist</option>
          <option value="applied">Applied</option>
          <option value="networking">Networking</option>
          <option value="interview">Interview</option>
          <option value="untracked">Untracked</option>
        </select>
        <select id="recencyFilter">
          <option value="latest" selected>Latest positions</option>
          <option value="all">All positions</option>
        </select>
        <select id="ageFilter">
          <option value="all">All opportunities</option>
          <option value="friendly">Age-friendly (60+)</option>
          <option value="flagged">Flagged age concerns</option>
        </select>
      </div>
      <p class="meta" id="meta"></p>
    </header>

    <main>
      <section>
        <h2>Executive / Advisory Roles (Telecom, Data Center, Connectivity)</h2>
        <div id="executiveList" class="card-grid"></div>
      </section>

      <section>
        <h2>Board / Independent Director Signals</h2>
        <div id="boardList" class="card-grid"></div>
      </section>
    </main>

    <template id="opportunityTemplate">
      <article class="card">
        <h3 class="title"></h3>
        <span class="badge latest-badge" hidden>Latest</span>
        <p class="age-badge"></p>
        <p class="company"></p>
        <p class="details"></p>
        <p class="source"></p>
        <p class="score"></p>
        <p class="age-reasons"></p>
        <a class="link" target="_blank" rel="noopener noreferrer"></a>
        <div class="tracker">
          <label>
            Tracker status
            <select class="tracker-status">
              <option value="">Untracked</option>
              <option value="shortlist">Shortlist</option>
              <option value="applied">Applied</option>
              <option value="networking">Networking</option>
              <option value="interview">Interview</option>
              <option value="archived">Archived</option>
            </select>
          </label>
          <label>
            Notes
            <textarea class="tracker-notes" rows="3" placeholder="Add networking notes, next steps, contacts..."></textarea>
          </label>
        </div>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
